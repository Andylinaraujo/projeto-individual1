  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    // var codigoVar = codigo_input.value;
    // var idEmpresaVincular

    // Verificando se há algum campo em branco
    if (!nomeVar || !emailVar || !senhaVar || !confirmacaoSenhaVar) {
      erro3.innerHTML = "Verifique se todos os campos de cadastro foram devidamente preenchidos."
      return ;
    }

    else if (nomeVar.length <= 1) {
      erro.innerHTML ="O nome deve ter mais de um caractere."
      return ;
    }

    else if (emailVar.length > 50 || emailVar.includes(" ") || !emailVar.includes("@") ||
      !emailVar.includes(".") || emailVar.lastIndexOf(".") < emailVar.lastIndexOf("@")) {
      erro1.innerHTML = "Insira um endereço de e-mail válido."
      return ;
    }

    else if (senhaVar.length < 8 || senhaVar.length > 50) {
      erro2.innerHTML = "A senha deve ter entre 8 e 50 caracteres."
      return ;
    }

    else if (senhaVar != confirmacaoSenhaVar) {
      erro3.innerHTML = "As senhas não coincidem."
      return ;
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })


    return false;
