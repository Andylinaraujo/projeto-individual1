<script>
    let listalink = []
    let listaimg = []
    let lista = []
    function add() {
        
        if (!lista.includes(idtag.value)) {
            lista.push(idtag.value);
        }
        div_tag.innerHTML = lista
    }
    function addimg() {
        div_imagem.innerHTML = ""
        if (!listaimg.includes(idimagem.value)) {
                listaimg.push(idimagem.value);
            }
        for (let i = 0; i < listaimg.length; i++) {
            
            div_imagem.innerHTML += `<img src="${listaimg[i]}" alt="" class="games">`
        }
    }
    function addlink() {
        div_link.innerHTML = ""
        if (!listalink.includes(idlink.value)) {
                listalink.push(idlink.value);
            }
        for (let i = 0; i < listalink.length; i++) {
            
            div_link.innerHTML += `${listalink[i]}<br>`
        }
    }
    function rem() {
        lista.pop()
        div_tag.innerHTML = lista
    }
    function remimg() {
        listaimg.pop()
        div_imagem.innerHTML = ""
        for (let i = 0; i < listaimg.length; i++) {
            div_imagem.innerHTML += `<img src="${listaimg[i]}" alt="" class="games">`
        }
    }
    function remlink() {
        listalink.pop()
        div_link.innerHTML = ""
        for (let i = 0; i < listalink.length; i++) {
            div_link.innerHTML += `${listalink[i]}<br>`
        }
    }
    if (email != null && nome != null) {
        document.getElementById("log").style.display = "none";
        document.getElementById("cad").style.display = "none";
    }
    else {
        document.getElementById("logout").style.display = "none";

    }
    function registrar() {
        if (
            idnome.value == "" ||
            descricao.value == "" ||
            lista.length == 0
        ) {
            alert("Preencha todos os campos obrigatórios.");
            return;
        }
        fetch("/catalogo/registrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeServer1: idnome.value,
                descricaoServer: descricao.value,
                tagServer: lista.join(";"),
                imagemServer: listaimg.join(";"),
                linksServer: listalink.join(";"),
                idUsuarioServer: sessionStorage.ID_USUARIO,

            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {

                    setTimeout(() => {
                        window.location = "jogos.html";
                    }, "2000");


                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                finalizarAguardar();
            });

        return false;

    }

</script>
